<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Profiler</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .phase-active {
      background-image: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.55) 50%, rgba(255,255,255,0) 100%);
      background-size: 200% 100%;
      animation: progress-shimmer 1s linear infinite;
    }
    @keyframes progress-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .log-line { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; }
    .report-content { color: #1f2937; }
    .report-content h1 { font-size: 1.45rem; line-height: 1.35; font-weight: 750; margin: 1rem 0 0.55rem; color: #111827; }
    .report-content h2 { font-size: 1.13rem; font-weight: 750; margin: 1.35rem 0 0.55rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.45rem; color: #111827; }
    .report-content h3 { font-size: 1rem; font-weight: 700; margin: 1rem 0 0.35rem; color: #111827; }
    .report-content table { width: 100%; border-collapse: collapse; margin: 0.65rem 0; font-size: 0.92rem; }
    .report-content th, .report-content td { text-align: left; padding: 0.55rem 0.8rem; border: 1px solid #e5e7eb; vertical-align: top; }
    .report-content th { background: #f8fafc; font-weight: 650; color: #475569; }
    .report-content td { color: #1f2937; }
    .report-content ul { list-style: disc; padding-left: 1.5rem; margin: 0.4rem 0; color: #334155; }
    .report-content ol { list-style: decimal; padding-left: 1.5rem; margin: 0.4rem 0; color: #334155; }
    .report-content blockquote { background: #f8fafc; border: 1px solid #e2e8f0; border-left: 3px solid #2563eb; padding: 0.75rem 1rem; border-radius: 8px; color: #475569; margin: 0.75rem 0; }
    .report-content strong { font-weight: 600; }
    .report-content a { color: #2563eb; text-decoration: none; font-weight: 500; }
    .report-content a:hover { text-decoration: underline; }
    .report-content hr { border: 0; border-top: 1px solid #e5e7eb; margin: 1.1rem 0; }
    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
    .tag-重点客户 { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .tag-待跟进 { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
    .tag-已成交 { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .tag-暂不适合 { background: #f9fafb; color: #6b7280; border: 1px solid #e5e7eb; }
    .tag-需回访 { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .tag-custom { background: #faf5ff; color: #7c3aed; border: 1px solid #e9d5ff; }
    .checkbox-row { transition: background 0.15s; }
    .checkbox-row.selected { background: #eff6ff; }
    .session-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .session-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid #eef0f3; }
    .session-row:last-child { border-bottom: 0; }
    .session-icon { width: 34px; height: 34px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto; font-size: 13px; font-weight: 700; color: #334155; background: #f1f5f9; border: 1px solid #e2e8f0; }
    .session-icon-ok { color: #166534; background: #dcfce7; border-color: #bbf7d0; }
    .session-icon-warn { color: #92400e; background: #fef3c7; border-color: #fde68a; }
    .session-status { min-width: 68px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 5px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; white-space: nowrap; }
    .session-status::before { content: ""; width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
    .session-status-ok { color: #15803d; background: #f0fdf4; }
    .session-status-warn { color: #b45309; background: #fffbeb; }
    .session-status-idle { color: #64748b; background: #f8fafc; }
    .session-actions { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; }
    .session-action { height: 34px; min-width: 86px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; padding: 0 14px; font-size: 13px; font-weight: 600; transition: background-color .15s ease, border-color .15s ease, color .15s ease, box-shadow .15s ease; }
    .session-action-primary { color: #fff; background: #2563eb; border: 1px solid #2563eb; box-shadow: 0 1px 2px rgba(37, 99, 235, .18); }
    .session-action-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
    .session-action-secondary { color: #334155; background: #fff; border: 1px solid #cbd5e1; }
    .session-action-secondary:hover { background: #f8fafc; border-color: #94a3b8; }
    .session-action:disabled { opacity: .65; cursor: not-allowed; box-shadow: none; }
    .session-modal-card { width: min(480px, calc(100vw - 32px)); max-height: min(80vh, 720px); overflow-y: auto; }
    .lookup-submit { min-height: 42px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; padding: 0 24px; font-weight: 650; color: #fff; border: 1px solid transparent; transition: background-color .15s ease, border-color .15s ease, box-shadow .15s ease; }
    .lookup-submit-primary { background: #2563eb; border-color: #2563eb; box-shadow: 0 1px 2px rgba(37,99,235,.18); }
    .lookup-submit-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
    .lookup-submit-danger { background: #dc2626; border-color: #dc2626; box-shadow: 0 1px 2px rgba(220,38,38,.18); }
    .lookup-submit-danger:hover { background: #b91c1c; border-color: #b91c1c; }
    .lookup-submit:disabled { opacity: .65; cursor: not-allowed; box-shadow: none; }
    .phase-label { font-size: 11px; color: #94a3b8; font-weight: 600; text-align: center; transition: color .15s ease; }
    .phase-label-done { color: #16a34a; }
    .phase-label-active { color: #2563eb; }
    .trust-panel { border: 1px solid #e2e8f0; background: #f8fafc; border-radius: 10px; padding: 12px 14px; }
    .trust-panel-warn { border-color: #fde68a; background: #fffbeb; }
    .trust-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: #334155; margin-bottom: 8px; }
    .trust-panel-warn .trust-title { color: #92400e; }
    .trust-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .source-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; border: 1px solid #dbeafe; background: #eff6ff; color: #1d4ed8; }
    .source-pill-muted { border-color: #e2e8f0; background: #f8fafc; color: #64748b; }
    .source-pill-warn { border-color: #fde68a; background: #fef3c7; color: #92400e; }
    .trust-note { margin-top: 8px; font-size: 12px; color: #64748b; line-height: 1.5; }
    .summary-grid { display: grid; grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr); gap: 12px; }
    .summary-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; background: #fff; }
    .summary-card-muted { background: #f8fafc; }
    .summary-label { font-size: 12px; color: #64748b; font-weight: 700; margin-bottom: 6px; }
    .summary-title { font-size: 16px; line-height: 1.4; font-weight: 700; color: #111827; }
    .summary-text { font-size: 13px; line-height: 1.6; color: #475569; }
    .summary-kv { display: grid; grid-template-columns: 78px minmax(0, 1fr); gap: 6px 10px; font-size: 13px; line-height: 1.5; }
    .summary-kv dt { color: #64748b; font-weight: 600; }
    .summary-kv dd { color: #1f2937; min-width: 0; }
    .summary-list { margin: 0; padding-left: 18px; font-size: 13px; line-height: 1.6; color: #334155; }
    .report-header { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
    .report-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .report-action { min-height: 34px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; padding: 0 12px; font-size: 13px; font-weight: 600; transition: background-color .15s ease, border-color .15s ease, color .15s ease, box-shadow .15s ease; white-space: nowrap; }
    .report-action-primary { color: #fff; background: #2563eb; border: 1px solid #2563eb; box-shadow: 0 1px 2px rgba(37,99,235,.18); }
    .report-action-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
    .report-action-secondary { color: #334155; background: #fff; border: 1px solid #cbd5e1; }
    .report-action-secondary:hover { color: #1d4ed8; background: #f8fafc; border-color: #93c5fd; }
    .report-action:disabled { opacity: .65; cursor: not-allowed; box-shadow: none; }
    @media(max-width:760px){.summary-grid{grid-template-columns:1fr}.summary-kv{grid-template-columns:1fr}.report-header{align-items:flex-start}.report-actions{width:100%;justify-content:flex-start}.report-action{flex:1 1 auto}}
    @media(max-width:560px){.session-toolbar{align-items:flex-start;flex-direction:column}.session-row{align-items:flex-start;flex-direction:column;gap:10px}.session-actions{width:100%;justify-content:flex-start;flex-wrap:wrap}.session-action{flex:1 1 112px}.session-status{flex:0 0 auto}.session-modal-card{max-height:calc(100vh - 32px)}}
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <h1 class="text-xl font-bold text-gray-900">Social Profiler</h1>
        <span class="text-sm text-gray-400">客户画像工具</span>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="goToHistory()" class="text-sm text-gray-500 hover:text-gray-700">历史记录</button>
        <button onclick="showSessionStatus()" class="text-sm text-gray-500 hover:text-gray-700">登录状态</button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">

    <!-- 查询表单 -->
    <section id="form-section" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
      <h2 class="text-lg font-semibold text-gray-900 mb-4">新建查询</h2>
      <form id="lookup-form" onsubmit="startLookup(event)">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">目标姓名 *</label>
            <input type="text" name="name" required placeholder="张三 / John Smith"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">公司名称</label>
            <input type="text" name="company" placeholder="XX科技 / Google"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">LinkedIn URL（可选，跳过搜索）</label>
          <input type="url" name="linkedin" placeholder="https://linkedin.com/in/..."
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        </div>
        <div class="flex items-center gap-4 mb-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">语言</label>
            <select name="lang" class="px-3 py-2 border border-gray-300 rounded-lg">
              <option value="zh" selected>中文</option>
              <option value="en">English</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">深度</label>
            <select name="depth" class="px-3 py-2 border border-gray-300 rounded-lg">
              <option value="quick" selected>快速（主页）</option>
              <option value="deep">深度（主页+动态）</option>
            </select>
          </div>
        </div>
        <div class="flex items-center gap-6">
          <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
            <input type="checkbox" name="feishu" class="w-4 h-4 text-blue-600 rounded">
            <span>发送到飞书</span>
          </label>
          <button type="submit" id="submit-btn"
            class="lookup-submit lookup-submit-primary">
            开始查询
          </button>
        </div>
      </form>
    </section>

    <!-- 进度区域 -->
    <section id="progress-section" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
      <h2 class="text-lg font-semibold text-gray-900 mb-4">查询进度</h2>
      <div class="flex items-center gap-2 mb-4">
        <div id="phase-1" class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden"><div class="h-full bg-blue-500 rounded-full transition-all duration-500" style="width: 0%"></div></div>
        <div id="phase-2" class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden"><div class="h-full bg-blue-500 rounded-full transition-all duration-500" style="width: 0%"></div></div>
        <div id="phase-3" class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden"><div class="h-full bg-blue-500 rounded-full transition-all duration-500" style="width: 0%"></div></div>
        <div id="phase-4" class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden"><div class="h-full bg-blue-500 rounded-full transition-all duration-500" style="width: 0%"></div></div>
        <div id="phase-5" class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden"><div class="h-full bg-blue-500 rounded-full transition-all duration-500" style="width: 0%"></div></div>
      </div>
      <div class="grid grid-cols-5 gap-2 mb-3">
        <div id="phase-label-1" class="phase-label">搜索</div>
        <div id="phase-label-2" class="phase-label">抓取</div>
        <div id="phase-label-3" class="phase-label">合并</div>
        <div id="phase-label-4" class="phase-label">分析</div>
        <div id="phase-label-5" class="phase-label">报告</div>
      </div>
      <div class="mt-3 flex justify-end">
        <button type="button" onclick="toggleProgressDetails()" id="progress-detail-btn" aria-expanded="false" class="px-3 py-1.5 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">
          查看详细进度
        </button>
      </div>
      <div id="progress-details" class="hidden mt-3">
        <div id="current-status" class="text-sm text-gray-600 mb-3">等待开始</div>
        <div id="log-container" class="bg-gray-900 text-gray-300 rounded-lg p-4 max-h-48 overflow-y-auto font-mono text-sm"></div>
      </div>
    </section>

    <!-- 报告区域 -->
    <section id="report-section" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
      <div class="report-header">
        <div class="flex items-center gap-2">
          <button onclick="backToHistory()" id="btn-back-history" class="hidden text-sm text-gray-500 hover:text-gray-700">← 返回历史</button>
          <h2 class="text-lg font-semibold text-gray-900">画像报告</h2>
        </div>
        <div class="report-actions">
          <button onclick="openHtmlReport()" id="btn-html" class="report-action report-action-secondary">HTML 报告</button>
          <button onclick="downloadPDF()" class="report-action report-action-secondary">下载 PDF</button>
          <button onclick="sendCurrentReportToFeishu()" id="btn-feishu" class="report-action report-action-primary">发送到飞书</button>
        </div>
      </div>
      <!-- 标签显示 -->
      <div id="report-tags" class="mb-4 flex items-center gap-2 flex-wrap"></div>
      <div id="report-summary" class="mb-4" data-report-anchor="summary"></div>
      <div id="report-trust" class="mb-4"></div>
      <div id="report-content" class="report-content prose prose-sm max-w-none"></div>
    </section>

    <!-- 历史记录 -->
    <section id="history-section" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
      <h2 class="text-lg font-semibold text-gray-900 mb-4">历史记录</h2>

      <!-- 搜索 + 筛选 -->
      <div class="flex flex-wrap items-center gap-2 mb-4 pb-4 border-b border-gray-100">
        <input type="text" id="history-search" placeholder="搜索名字、公司..."
          onkeyup="debounceSearch()"
          class="flex-1 min-w-[180px] h-9 px-3 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
        <div class="flex items-center gap-1">
          <input type="date" id="history-from" onchange="loadHistory()"
            class="h-9 px-2.5 border border-gray-300 rounded-lg text-sm">
          <span class="text-gray-400 text-xs px-0.5">—</span>
          <input type="date" id="history-to" onchange="loadHistory()"
            class="h-9 px-2.5 border border-gray-300 rounded-lg text-sm">
        </div>
        <select id="history-tag-filter" onchange="loadHistory()"
          class="h-9 px-2.5 border border-gray-300 rounded-lg text-sm">
          <option value="">全部标签</option>
        </select>
        <button onclick="clearFilters()" class="h-9 px-3 text-sm text-gray-500 hover:text-gray-700 border border-gray-300 rounded-lg">清除</button>
      </div>

      <!-- 批量操作栏 -->
      <div id="batch-bar" class="hidden mb-3 p-3 bg-blue-50 rounded-lg flex items-center gap-3">
        <span id="batch-count" class="text-sm text-blue-700 font-medium">已选 0 项</span>
        <div class="flex gap-1 flex-wrap" id="batch-tags"></div>
        <div class="ml-auto flex items-center gap-3">
          <button onclick="deleteSelectedHistory()" class="text-xs text-red-600 hover:text-red-700 font-medium">删除</button>
          <button onclick="clearSelection()" class="text-xs text-gray-500 hover:text-gray-700">取消</button>
        </div>
      </div>

      <!-- 列表 -->
      <div id="history-list"></div>
    </section>

    <!-- 登录状态弹窗 -->
    <div id="session-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
      <div class="session-modal-card bg-white rounded-xl shadow-xl">
        <div class="flex items-center justify-between p-5 pb-0">
          <h2 class="text-lg font-semibold text-gray-900">登录状态</h2>
          <button onclick="closeSessionModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
        </div>
        <div id="session-list" class="p-5 pt-3"></div>
      </div>
    </div>

  </main>

  <!-- 标签编辑弹窗 -->
  <div id="tag-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl p-6 w-[400px] max-h-[80vh] overflow-y-auto">
      <h3 class="text-lg font-semibold mb-4">编辑标签</h3>
      <div id="tag-modal-content"></div>
      <div class="flex justify-end gap-2 mt-4">
        <button onclick="closeTagModal()" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">取消</button>
        <button onclick="saveTagModal()" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存</button>
      </div>
    </div>
  </div>

  <script>
    let currentData = null;
    let currentFilename = null;
    let selectedFiles = new Set();
    let allTags = [];
    let presetTags = [];
    let searchTimer = null;
    const platformNames = {
      linkedin: 'LinkedIn',
      instagram: 'Instagram',
      companyInstagram: '公司 Instagram',
      facebook: 'Facebook',
      companyFacebook: '公司 Facebook',
      x: 'X',
      companyX: '公司 X',
      google: 'Google',
    };

    // ==================== 初始化 ====================
    async function init() {
      const [tagsResp, presetsResp] = await Promise.all([
        fetch('/api/tags'),
        fetch('/api/tags/presets'),
      ]);
      allTags = await tagsResp.json();
      presetTags = await presetsResp.json();
      updateTagFilter();
    }
    init();

    // ==================== 查询 ====================
    let lookupAbortController = null;
    let lookupStartedAt = null;
    let lookupStatusTimer = null;
    let lookupLastMessage = '准备查询...';
    let lookupLastEventAt = null;
    let progressDetailsVisible = false;

    async function startLookup(e) {
      e.preventDefault();
      if (lookupAbortController) {
        cancelLookup();
        return;
      }

      const form = e.target;
      const btn = document.getElementById('submit-btn');

      const body = {
        name: form.name.value.trim(),
        company: form.company.value.trim() || undefined,
        linkedin: form.linkedin.value.trim() || undefined,
        lang: form.lang.value,
        depth: form.depth.value,
        feishu: form.feishu?.checked || false,
      };

      // 创建新的 AbortController
      lookupAbortController = new AbortController();

      setSubmitButtonMode('cancel');
      showSection('progress');
      hideSection('report');
      hideSection('history');
      clearLog();
      resetPhases();
      resetProgressDetails();
      startLookupStatusTimer();

      try {
        const resp = await fetch('/api/lookup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          signal: lookupAbortController.signal,
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) {
            if (buffer.trim()) processSSEChunk(buffer);
            break;
          }

          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop();
          parts.forEach(processSSEChunk);
        }
      } catch (err) {
        if (err.name === 'AbortError') {
          addLog('⏹ 已取消查询');
          setLookupStatus('已取消查询');
        } else {
          addLog('❌ 错误: ' + err.message);
          setLookupStatus('查询出错: ' + err.message);
        }
      } finally {
        stopLookupStatusTimer();
        setSubmitButtonMode('start');
        lookupAbortController = null;
      }
    }

    function cancelLookup() {
      if (lookupAbortController) {
        const btn = document.getElementById('submit-btn');
        if (btn) {
          btn.disabled = true;
          btn.textContent = '正在取消...';
        }
        lookupAbortController.abort();
        addLog('⏹ 正在取消...');
      }
    }

    function handleSSE(event, data) {
      switch (event) {
        case 'progress':
          lookupLastMessage = data.message || lookupLastMessage;
          lookupLastEventAt = Date.now();
          updatePhase(data.phase, data.message);
          addLog(data.message);
          break;
        case 'heartbeat':
          lookupLastMessage = data.message || lookupLastMessage;
          lookupLastEventAt = Date.now();
          updateLookupHeartbeat(data);
          break;
        case 'result':
          currentData = data;
          currentFilename = basenameFromAnyPath(data.files?.json) || null;
          completeAllPhases();
          stopLookupStatusTimer();
          setLookupStatus('查询完成');
          addLog('✅ 查询完成');
          if (data.warnings?.length) data.warnings.forEach(w => addLog('⚠️ ' + w));
          showReport(data);
          break;
        case 'error':
          stopLookupStatusTimer();
          setLookupStatus('查询出错: ' + data.message);
          addLog('❌ ' + data.message);
          break;
      }
    }

    function basenameFromAnyPath(value) {
      return String(value || '').split(/[\\/]/).filter(Boolean).pop() || '';
    }

    function processSSEChunk(chunk) {
      let eventType = null;
      const dataLines = [];

      chunk.split('\n').forEach((line) => {
        if (line.startsWith('event: ')) eventType = line.slice(7).trim();
        if (line.startsWith('data: ')) dataLines.push(line.slice(6));
      });

      if (!eventType || !dataLines.length) return;

      try {
        handleSSE(eventType, JSON.parse(dataLines.join('\n')));
      } catch (err) {
        addLog('⚠️ 进度消息解析失败: ' + err.message);
      }
    }

    // ==================== 进度 ====================
    function setSubmitButtonMode(mode) {
      const btn = document.getElementById('submit-btn');
      if (!btn) return;

      btn.disabled = false;
      btn.classList.remove('lookup-submit-primary', 'lookup-submit-danger');

      if (mode === 'cancel') {
        btn.textContent = '取消查询';
        btn.classList.add('lookup-submit-danger');
      } else {
        btn.textContent = '开始查询';
        btn.classList.add('lookup-submit-primary');
      }
    }

    function resetProgressDetails() {
      progressDetailsVisible = false;
      const details = document.getElementById('progress-details');
      const btn = document.getElementById('progress-detail-btn');
      details?.classList.add('hidden');
      if (btn) {
        btn.textContent = '查看详细进度';
        btn.setAttribute('aria-expanded', 'false');
      }
    }

    function toggleProgressDetails() {
      progressDetailsVisible = !progressDetailsVisible;
      const details = document.getElementById('progress-details');
      const btn = document.getElementById('progress-detail-btn');
      details?.classList.toggle('hidden', !progressDetailsVisible);
      if (btn) {
        btn.textContent = progressDetailsVisible ? '隐藏详细进度' : '查看详细进度';
        btn.setAttribute('aria-expanded', String(progressDetailsVisible));
      }
    }

    function formatDuration(seconds) {
      const safe = Math.max(0, Math.floor(seconds || 0));
      const minutes = Math.floor(safe / 60);
      const rest = safe % 60;
      return minutes > 0 ? `${minutes}分${rest}秒` : `${rest}秒`;
    }

    function setLookupStatus(message) {
      const status = document.getElementById('current-status');
      if (status) status.textContent = message;
    }

    function renderRunningStatus() {
      if (!lookupStartedAt) return;
      const elapsed = Math.floor((Date.now() - lookupStartedAt) / 1000);
      const syncAge = lookupLastEventAt ? Math.floor((Date.now() - lookupLastEventAt) / 1000) : 0;
      const syncText = lookupLastEventAt ? `，${formatDuration(syncAge)}前同步` : '';
      setLookupStatus(`查询中，已用时 ${formatDuration(elapsed)}：${lookupLastMessage}${syncText}`);
    }

    function startLookupStatusTimer() {
      stopLookupStatusTimer();
      lookupStartedAt = Date.now();
      lookupLastEventAt = Date.now();
      lookupLastMessage = '准备查询...';
      renderRunningStatus();
      lookupStatusTimer = setInterval(renderRunningStatus, 1000);
    }

    function stopLookupStatusTimer() {
      if (lookupStatusTimer) clearInterval(lookupStatusTimer);
      lookupStatusTimer = null;
    }

    function updateLookupHeartbeat(data) {
      if (data?.phase) updatePhase(data.phase, data.message);
      const elapsed = data?.elapsedSeconds ?? (lookupStartedAt ? Math.floor((Date.now() - lookupStartedAt) / 1000) : 0);
      const quiet = data?.secondsSinceProgress ?? 0;
      setLookupStatus(`查询中，已用时 ${formatDuration(elapsed)}：${lookupLastMessage}（${formatDuration(quiet)}内无新阶段）`);
    }

    function updatePhase(phase, message) {
      const status = document.getElementById('current-status');
      if (status && message) status.textContent = message;

      for (let i = 1; i <= 5; i++) {
        const bar = document.querySelector(`#phase-${i} > div`);
        const label = document.getElementById(`phase-label-${i}`);
        if (!bar) continue;
        bar.classList.remove('phase-active');
        label?.classList.remove('phase-label-done', 'phase-label-active');
      }

      for (let i = 1; i < phase; i++) {
        const bar = document.querySelector(`#phase-${i} > div`);
        const label = document.getElementById(`phase-label-${i}`);
        if (!bar) continue;
        bar.style.width = '100%'; bar.classList.remove('bg-blue-500', 'phase-active'); bar.classList.add('bg-green-500');
        label?.classList.add('phase-label-done');
      }
      const current = document.querySelector(`#phase-${phase} > div`);
      if (current) {
        current.style.width = '100%';
        current.classList.remove('bg-green-500');
        current.classList.add('bg-blue-500', 'phase-active');
      }
      document.getElementById(`phase-label-${phase}`)?.classList.add('phase-label-active');
    }
    function completeAllPhases() {
      for (let i = 1; i <= 5; i++) {
        const bar = document.querySelector(`#phase-${i} > div`);
        const label = document.getElementById(`phase-label-${i}`);
        bar.style.width = '100%'; bar.classList.remove('bg-blue-500', 'phase-active'); bar.classList.add('bg-green-500');
        label?.classList.remove('phase-label-active');
        label?.classList.add('phase-label-done');
      }
    }
    function resetPhases() {
      const status = document.getElementById('current-status');
      if (status) status.textContent = '准备查询...';
      lookupStartedAt = null;
      lookupLastEventAt = null;
      lookupLastMessage = '准备查询...';
      for (let i = 1; i <= 5; i++) {
        const bar = document.querySelector(`#phase-${i} > div`);
        const label = document.getElementById(`phase-label-${i}`);
        bar.style.width = '0%'; bar.classList.remove('bg-green-500', 'phase-active'); bar.classList.add('bg-blue-500');
        label?.classList.remove('phase-label-done', 'phase-label-active');
      }
    }
    function addLog(msg) {
      const c = document.getElementById('log-container');
      const d = document.createElement('div'); d.className = 'log-line';
      d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      c.appendChild(d); c.scrollTop = c.scrollHeight;
    }
    function clearLog() { document.getElementById('log-container').innerHTML = ''; }

    // ==================== 报告 ====================
    function showReport(data) {
      const content = document.getElementById('report-content');
      if (data.markdown) {
        content.innerHTML = marked.parse(data.markdown);
        openReportLinksInNewTab(content);
      } else {
        content.innerHTML = fallbackReportHTML(data);
        openReportLinksInNewTab(content);
      }
      // 显示标签
      renderReportTags(data._tags || []);
      renderReportSummary(data);
      renderReportTrust(data);
      showSection('report');
    }

    function reportPayload(data) {
      return data?.merged || data || {};
    }

    function platformLabel(key) {
      return platformNames[key] || key;
    }

    function sourceSummary(data) {
      const payload = reportPayload(data);
      const platforms = payload.platforms || {};
      return Object.entries(platforms)
        .filter(([, info]) => info && info.found !== false)
        .map(([key, info]) => ({
          key,
          name: platformLabel(key),
          excluded: !!info.excludedFromAnalysis,
          note: info.note || info.error || '',
        }));
    }

    function reportAnalysis(data) {
      const payload = reportPayload(data);
      return data?.analysis || payload.analysis || {};
    }

    function firstText(value, fallback = '') {
      if (Array.isArray(value)) {
        const hit = value.find(Boolean);
        return hit ? readableText(hit) : fallback;
      }
      return value ? readableText(value) : fallback;
    }

    function readableText(value) {
      if (typeof value === 'object' && value !== null) {
        return String(value.title || value.name || value.text || value.label || JSON.stringify(value));
      }
      return String(value);
    }

    function shortText(value, max = 150) {
      const text = firstText(value).replace(/\s+/g, ' ').trim();
      if (!text) return '';
      return text.length > max ? `${text.slice(0, max)}...` : text;
    }

    function valueList(value) {
      if (Array.isArray(value)) return value.filter(Boolean).map(item => firstText(item)).filter(Boolean);
      return value ? [readableText(value)] : [];
    }

    function detailRow(label, value) {
      const items = valueList(value);
      if (!items.length) return '';
      return `<dt>${escapeHTML(label)}</dt><dd>${items.map(escapeHTML).join('、')}</dd>`;
    }

    function angleList(label, value) {
      const items = valueList(value);
      if (!items.length) return '';
      return `<h4 class="summary-label mt-3">${escapeHTML(label)}</h4><ul>${items.map(item => `<li>${escapeHTML(item)}</li>`).join('')}</ul>`;
    }

    function fallbackAnglesHTML(query, analysis) {
      if (!(query.depth === 'deep')) return '';
      const angles = analysis.analysisAngles || {};
      const blocks = [
        angleList('证据依据', angles.evidenceBasis),
        angleList('业务机会', angles.businessOpportunities),
        angleList('风险提醒', angles.riskNotes),
        angleList('下一步行动', angles.nextActions),
      ].filter(Boolean);
      if (!blocks.length) return '';
      return `<h3>多角度分析</h3>${blocks.join('')}`;
    }

    function fallbackReportHTML(data) {
      const payload = reportPayload(data);
      const analysis = reportAnalysis(data);
      const unified = payload.unified || {};
      const person = analysis.person || {};
      const company = analysis.company || {};
      const sales = analysis.salesInsights || {};
      const query = payload.query || {};
      const sources = sourceSummary(data);

      const name = unified.name || query.name || '未命名报告';
      const companyName = company.name || query.company || '';
      const fetchedAt = payload.fetchedAt ? new Date(payload.fetchedAt).toLocaleString('zh-CN') : '';
      const entryPoints = Array.isArray(sales.entryPoints) ? sales.entryPoints.filter(Boolean) : [];

      return `
        <div class="trust-panel">
          <div class="trust-title">报告内容</div>
          <div class="summary-title">${escapeHTML(name)}${companyName ? ` @ ${escapeHTML(companyName)}` : ''}</div>
          ${fetchedAt ? `<div class="summary-text mt-1">生成时间：${escapeHTML(fetchedAt)}</div>` : ''}
          ${unified.about ? `<blockquote>${escapeHTML(shortText(unified.about, 500))}</blockquote>` : ''}

          <h3>基础信息</h3>
          <dl class="summary-kv">
            ${detailRow('职位', unified.headline || person.role)}
            ${detailRow('所在地', unified.location)}
            ${detailRow('决策层级', person.decisionLevel)}
            ${detailRow('专业领域', person.expertise)}
            ${detailRow('兴趣爱好', person.hobbies)}
            ${detailRow('沟通风格', person.communicationStyle)}
          </dl>

          ${(company.mainProducts || company.targetMarket || company.recentNews) ? `
            <h3>公司信息</h3>
            <dl class="summary-kv">
              ${detailRow('主营产品', company.mainProducts)}
              ${detailRow('目标市场', company.targetMarket)}
              ${detailRow('近期动态', company.recentNews)}
            </dl>
          ` : ''}

          ${(entryPoints.length || sales.suggestedApproach || sales.bestChannel) ? `
            <h3>商务建议</h3>
            ${entryPoints.length ? `<ol>${entryPoints.map(item => `<li>${escapeHTML(item)}</li>`).join('')}</ol>` : ''}
            <dl class="summary-kv">
              ${detailRow('推荐沟通', sales.suggestedApproach)}
              ${detailRow('最佳渠道', sales.bestChannel)}
              ${detailRow('时机判断', sales.timing)}
            </dl>
          ` : ''}

          ${fallbackAnglesHTML(query, analysis)}

          ${sources.length ? `
            <h3>数据来源</h3>
            <ul>${sources.map(s => `<li>${escapeHTML(s.name)}：${s.excluded ? '仅展示，未纳入画像分析' : '已纳入画像分析'}${s.note ? `（${escapeHTML(s.note)}）` : ''}</li>`).join('')}</ul>
          ` : ''}

          <p class="text-sm text-gray-500 mt-4">该历史记录没有找到对应 Markdown 文件，以上内容由 JSON 报告自动整理。</p>
        </div>
      `;
    }

    function renderReportSummary(data) {
      const el = document.getElementById('report-summary');
      if (!el) return;

      const payload = reportPayload(data);
      const analysis = reportAnalysis(data);
      const unified = payload.unified || {};
      const company = analysis.company || {};
      const person = analysis.person || {};
      const sales = analysis.salesInsights || {};
      const entryPoints = Array.isArray(sales.entryPoints) ? sales.entryPoints.filter(Boolean).slice(0, 3) : [];

      const name = unified.name || payload.query?.name || '目标人物';
      const headline = unified.headline || person.role || '';
      const location = unified.location || '';
      const companyName = company.name || payload.query?.company || '';
      const role = person.decisionLevel || person.role || '';
      const bestChannel = sales.bestChannel || '';
      const approach = shortText(sales.suggestedApproach, 190);
      const companySignal = shortText(company.recentNews || company.mainProducts || company.targetMarket, 170);

      if (!headline && !location && !companyName && !role && !bestChannel && !approach && !entryPoints.length) {
        el.innerHTML = '';
        return;
      }

      el.innerHTML = `
        <div class="summary-grid">
          <div class="summary-card">
            <div class="summary-label">快速判断</div>
            <div class="summary-title">${escapeHTML(name)}</div>
            ${headline ? `<div class="summary-text mt-1">${escapeHTML(headline)}</div>` : ''}
            <dl class="summary-kv mt-3">
              ${location ? `<dt>所在地</dt><dd>${escapeHTML(location)}</dd>` : ''}
              ${companyName ? `<dt>公司</dt><dd>${escapeHTML(companyName)}</dd>` : ''}
              ${role ? `<dt>决策层级</dt><dd>${escapeHTML(role)}</dd>` : ''}
              ${bestChannel ? `<dt>最佳渠道</dt><dd>${escapeHTML(bestChannel)}</dd>` : ''}
            </dl>
          </div>
          <div class="summary-card summary-card-muted">
            <div class="summary-label">优先切入</div>
            ${entryPoints.length ? `<ol class="summary-list">${entryPoints.map(item => `<li>${escapeHTML(item)}</li>`).join('')}</ol>` : ''}
            ${approach ? `<div class="summary-text ${entryPoints.length ? 'mt-2' : ''}">${escapeHTML(approach)}</div>` : ''}
            ${companySignal ? `<div class="summary-text mt-2"><strong>公司信号：</strong>${escapeHTML(companySignal)}</div>` : ''}
          </div>
        </div>
      `;
    }

    function renderReportTrust(data) {
      const el = document.getElementById('report-trust');
      if (!el) return;

      const sources = sourceSummary(data);
      const included = sources.filter(s => !s.excluded);
      const excluded = sources.filter(s => s.excluded);
      const warnings = Array.isArray(data?.warnings) ? data.warnings : [];

      if (!sources.length && !warnings.length) {
        el.innerHTML = '';
        return;
      }

      const hasRisk = excluded.length || warnings.length;
      const title = hasRisk ? '数据可信度提示' : '已纳入画像的数据来源';
      const pills = [
        ...included.map(s => `<span class="source-pill">${s.name}<span>已纳入</span></span>`),
        ...excluded.map(s => `<span class="source-pill source-pill-warn" title="${escapeAttr(s.note)}">${s.name}<span>仅展示</span></span>`),
      ].join('');
      const warningText = warnings.concat(excluded.map(s => `${s.name}: ${s.note || '匹配度不足，未纳入画像分析'}`))
        .filter(Boolean)
        .slice(0, 3)
        .map(w => `<div>${escapeHTML(w)}</div>`)
        .join('');

      el.innerHTML = `
        <div class="trust-panel ${hasRisk ? 'trust-panel-warn' : ''}">
          <div class="trust-title">${hasRisk ? '⚠️' : '✓'} ${title}</div>
          <div class="trust-grid">${pills || '<span class="source-pill source-pill-muted">暂无可用来源</span>'}</div>
          ${warningText ? `<div class="trust-note">${warningText}</div>` : '<div class="trust-note">报告正文仅使用匹配度足够的来源；其他公开线索会保留在数据来源明细中，便于复核。</div>'}
        </div>
      `;
    }

    function escapeHTML(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeAttr(value) {
      return escapeHTML(value).replace(/'/g, '&#39;');
    }

    function openReportLinksInNewTab(container) {
      container.querySelectorAll('a[href]').forEach((link) => {
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
      });
    }

    function reportApiUrl(filename, suffix = '') {
      return `/api/report/${encodeURIComponent(filename)}${suffix}`;
    }

    function tagApiUrl(filename) {
      return `/api/tags/${encodeURIComponent(filename)}`;
    }

    function outputFileUrl(filename) {
      return `/output/${encodeURIComponent(filename)}`;
    }

    function renderReportTags(tags) {
      const container = document.getElementById('report-tags');
      const editButton = currentFilename
        ? `<button data-filename="${escapeAttr(currentFilename)}" onclick="openTagModal(this.dataset.filename)" class="text-xs text-blue-600 hover:underline ml-1">编辑标签</button>`
        : '';
      container.innerHTML = tags.map(t => tagHTML(t)).join('') + editButton;
    }

    async function downloadPDF() {
      if (!currentFilename) return;
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '生成中...';
      try {
        const resp = await fetch(reportApiUrl(currentFilename, '/pdf'));
        if (!resp.ok) throw new Error('PDF 生成失败');
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = currentFilename.replace('.json', '.pdf'); a.click();
        URL.revokeObjectURL(url);
      } catch (err) {
        alert('PDF 下载失败: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '下载 PDF';
      }
    }

    async function openHtmlReport() {
      if (!currentFilename) return;
      const btn = document.getElementById('btn-html');
      btn.disabled = true;
      btn.textContent = '生成中...';
      try {
        const resp = await fetch(reportApiUrl(currentFilename, '/html'));
        const data = await resp.json();
        if (data.url) {
          window.open(data.url, '_blank');
        } else {
          alert('生成失败');
        }
      } catch (err) {
        alert('生成失败: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'HTML 报告';
      }
    }

    async function sendCurrentReportToFeishu() {
      if (!currentFilename) return;
      const btn = document.getElementById('btn-feishu');
      btn.disabled = true;
      const oldText = btn.textContent;
      btn.textContent = '发送中...';
      try {
        const resp = await fetch(reportApiUrl(currentFilename, '/feishu'), { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || '发送失败');
        btn.textContent = '已发送';
        addLog(`✅ ${data.message || '已发送到飞书'}`);
        setTimeout(() => { btn.textContent = oldText; }, 1800);
      } catch (err) {
        alert('飞书发送失败: ' + err.message);
        btn.textContent = oldText;
      } finally {
        btn.disabled = false;
      }
    }

    // ==================== 历史记录 ====================
    function goToHistory() {
      hideSection('report');
      document.getElementById('btn-back-history').classList.add('hidden');
      showSection('history');
      loadHistory();
    }

    function backToHistory() {
      hideSection('report');
      document.getElementById('btn-back-history').classList.add('hidden');
      showSection('history');
      loadHistory();
    }

    let debounceTimer = null;
    function debounceSearch() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => loadHistory(), 300);
    }

    async function loadHistory() {
      const q = document.getElementById('history-search').value.trim();
      const from = document.getElementById('history-from').value;
      const to = document.getElementById('history-to').value;
      const tag = document.getElementById('history-tag-filter').value;

      const params = new URLSearchParams();
      if (q) params.set('q', q);
      if (from) params.set('from', from);
      if (to) params.set('to', to);
      if (tag) params.set('tag', tag);

      const resp = await fetch(`/api/history?${params}`);
      const history = await resp.json();

      const list = document.getElementById('history-list');
      if (!history.length) {
        list.innerHTML = '<p class="text-gray-500 text-sm py-4">暂无记录</p>';
        return;
      }

      list.innerHTML = `
        <div class="mb-2 flex items-center gap-2">
          <input type="checkbox" id="select-all" onchange="toggleSelectAll(this)" class="rounded">
          <label for="select-all" class="text-xs text-gray-500">全选</label>
          <span class="text-xs text-gray-400 ml-auto">${history.length} 条记录</span>
        </div>
      ` + history.map(h => historyRowHTML(h)).join('');

      updateBatchBar();
    }

    function historyRowHTML(h) {
      const date = new Date(h.createdAt).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
      const displayName = h.name || h.filename.replace(/-\d{4}-\d{2}-\d{2}\.json$/, '').replace(/_/g, ' ');
      const tags = (h.tags || []).map(t => tagHTML(t)).join('');
      const checked = selectedFiles.has(h.filename) ? 'checked' : '';
      const selectedCls = selectedFiles.has(h.filename) ? 'selected' : '';
      const fileAttr = escapeAttr(h.filename);
      const hasMarkdown = h.hasMarkdown ? '1' : '0';

      return `<div class="checkbox-row flex items-center gap-3 py-2.5 border-b border-gray-100 last:border-0 ${selectedCls}">
        <input type="checkbox" ${checked} data-filename="${fileAttr}" onchange="toggleSelect(this.dataset.filename, this)" class="rounded">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="text-sm font-medium text-gray-800 truncate">${escapeHTML(displayName)}</span>
            ${h.company ? `<span class="text-xs text-gray-400">@ ${escapeHTML(h.company)}</span>` : ''}
            <span class="flex gap-1 ml-1">${tags}</span>
          </div>
        </div>
        <span class="text-xs text-gray-400 shrink-0">${date}</span>
        <div class="flex gap-1 shrink-0">
          <button data-filename="${fileAttr}" data-has-markdown="${hasMarkdown}" onclick="viewHistory(this.dataset.filename, this.dataset.hasMarkdown === '1')" class="text-xs text-blue-600 hover:underline">查看</button>
          <button data-filename="${fileAttr}" onclick="openTagModal(this.dataset.filename)" class="text-xs text-gray-500 hover:text-gray-700 ml-1">标签</button>
        </div>
      </div>`;
    }

    async function viewHistory(filename, hasMarkdown = true) {
      try {
        const resp = await fetch(reportApiUrl(filename));
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || '报告不存在');
        currentData = data;
        currentFilename = filename;

        const mdFilename = filename.replace('.json', '.md');
        let markdown = null;
        if (hasMarkdown) {
          try {
            const mdResp = await fetch(outputFileUrl(mdFilename));
            if (mdResp.ok) markdown = await mdResp.text();
          } catch {}
        }

        currentData.markdown = markdown;
        showReport(currentData);
        hideSection('history');
        document.getElementById('btn-back-history').classList.remove('hidden');
      } catch (err) {
        alert('加载失败: ' + err.message);
      }
    }

    async function deleteSelectedHistory() {
      const filenames = Array.from(selectedFiles);
      if (!filenames.length) return;
      if (!confirm(`确定删除选中的 ${filenames.length} 份历史报告吗？对应的报告文件也会一起删除。`)) return;

      try {
        await Promise.all(filenames.map(async (filename) => {
          const resp = await fetch(reportApiUrl(filename), { method: 'DELETE' });
          const result = await resp.json();
          if (!resp.ok) throw new Error(result.error || '删除失败');
          return result;
        }));

        if (currentFilename && filenames.includes(currentFilename)) {
          currentFilename = null;
          currentData = null;
          document.getElementById('report-content').innerHTML = '';
          document.getElementById('report-actions').classList.add('hidden');
          document.getElementById('report-tags').innerHTML = '';
          document.getElementById('btn-back-history').classList.add('hidden');
        }

        selectedFiles.clear();
        await loadHistory();
        await init();
      } catch (err) {
        alert('删除失败: ' + err.message);
      }
    }

    // ==================== 批量选择 ====================
    function toggleSelect(filename, el) {
      if (el.checked) selectedFiles.add(filename);
      else selectedFiles.delete(filename);
      el.closest('.checkbox-row').classList.toggle('selected', el.checked);
      updateBatchBar();
    }

    function toggleSelectAll(el) {
      const checkboxes = document.querySelectorAll('#history-list input[type="checkbox"]:not(#select-all)');
      checkboxes.forEach(cb => {
        cb.checked = el.checked;
        const row = cb.closest('.checkbox-row');
        if (el.checked) {
          selectedFiles.add(cb.dataset.filename);
          row.classList.add('selected');
        } else {
          selectedFiles.clear();
          row.classList.remove('selected');
        }
      });
      updateBatchBar();
    }

    function clearSelection() {
      selectedFiles.clear();
      document.querySelectorAll('#history-list input[type="checkbox"]').forEach(cb => cb.checked = false);
      document.querySelectorAll('.checkbox-row').forEach(r => r.classList.remove('selected'));
      updateBatchBar();
    }

    function updateBatchBar() {
      const bar = document.getElementById('batch-bar');
      const count = document.getElementById('batch-count');
      if (selectedFiles.size === 0) {
        bar.classList.add('hidden');
        return;
      }
      bar.classList.remove('hidden');
      count.textContent = `已选 ${selectedFiles.size} 项`;

      // 批量标签按钮
      const tagsDiv = document.getElementById('batch-tags');
      tagsDiv.innerHTML = presetTags.map(t =>
        `<button onclick="batchTag('${t}')" class="tag tag-${t} cursor-pointer hover:opacity-80">${t}</button>`
      ).join('');
    }

    async function batchTag(tag) {
      if (!selectedFiles.size) return;
      await fetch('/api/tags/batch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filenames: Array.from(selectedFiles), tag, action: 'add' }),
      });
      clearSelection();
      loadHistory();
    }

    // ==================== 标签 ====================
    function tagHTML(tag) {
      const cls = presetTags.includes(tag) ? `tag-${tag}` : 'tag-custom';
      return `<span class="tag ${cls}">${escapeHTML(tag)}</span>`;
    }

    function updateTagFilter() {
      const select = document.getElementById('history-tag-filter');
      select.innerHTML = '<option value="">全部标签</option>' +
        allTags.map(t => `<option value="${escapeAttr(t)}">${escapeHTML(t)}</option>`).join('');
    }

    function clearFilters() {
      document.getElementById('history-search').value = '';
      document.getElementById('history-from').value = '';
      document.getElementById('history-to').value = '';
      document.getElementById('history-tag-filter').value = '';
      loadHistory();
    }

    // ==================== 标签弹窗 ====================
    let tagModalFilename = null;

    function openTagModal(filename) {
      if (!filename) return;
      tagModalFilename = filename;
      const modal = document.getElementById('tag-modal');
      const content = document.getElementById('tag-modal-content');

      // 获取当前标签
      fetch(reportApiUrl(filename))
        .then((r) => {
          if (!r.ok) throw new Error('报告不存在');
          return r.json();
        })
        .then(data => {
          const currentTags = data._tags || [];

          content.innerHTML = `
            <div class="mb-3">
              <label class="block text-sm font-medium text-gray-700 mb-2">预设标签</label>
              <div class="flex flex-wrap gap-2" id="preset-tags-list">
                ${presetTags.map(t => {
                  const active = currentTags.includes(t);
                  return `<button type="button" data-tag="${escapeAttr(t)}" data-active="${active ? '1' : '0'}" onclick="togglePresetTag(this)"
                    class="tag tag-${t} cursor-pointer transition-all ${active ? 'ring-2 ring-offset-1 ring-blue-400 opacity-100' : 'opacity-40 hover:opacity-70'}">
                    ${active ? '✓ ' : ''}${escapeHTML(t)}
                  </button>`;
                }).join('')}
              </div>
            </div>
            <div class="mb-3">
              <label class="block text-sm font-medium text-gray-700 mb-2">自定义标签</label>
              <div id="custom-tags-list" class="flex flex-wrap gap-2 mb-2">
                ${currentTags.filter(t => !presetTags.includes(t)).map(t => `
                  <span class="tag tag-custom flex items-center gap-1">
                    ${escapeHTML(t)}
                    <button onclick="this.parentElement.remove()" class="text-purple-400 hover:text-purple-700">×</button>
                  </span>
                `).join('')}
              </div>
              <div class="flex gap-2">
                <input type="text" id="new-custom-tag" placeholder="输入标签名"
                  class="flex-1 px-3 py-1.5 border border-gray-300 rounded text-sm"
                  onkeyup="if(event.key==='Enter')addCustomTag()">
                <button onclick="addCustomTag()" class="px-3 py-1.5 text-sm bg-gray-100 rounded hover:bg-gray-200">添加</button>
              </div>
            </div>
          `;
          modal.classList.remove('hidden');
        })
        .catch((err) => {
          alert('标签加载失败: ' + err.message);
        });
    }

    function togglePresetTag(el) {
      const active = el.dataset.active === '1';
      if (active) {
        el.dataset.active = '0';
        el.classList.remove('ring-2', 'ring-offset-1', 'ring-blue-400', 'opacity-100');
        el.classList.add('opacity-40', 'hover:opacity-70');
        el.textContent = el.dataset.tag;
      } else {
        el.dataset.active = '1';
        el.classList.add('ring-2', 'ring-offset-1', 'ring-blue-400', 'opacity-100');
        el.classList.remove('opacity-40', 'hover:opacity-70');
        el.textContent = '✓ ' + el.dataset.tag;
      }
    }

    function addCustomTag() {
      const input = document.getElementById('new-custom-tag');
      const val = input.value.trim();
      if (!val) return;
      const list = document.getElementById('custom-tags-list');
      const span = document.createElement('span');
      span.className = 'tag tag-custom flex items-center gap-1';
      span.append(document.createTextNode(val));
      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.textContent = '×';
      removeBtn.className = 'text-purple-400 hover:text-purple-700';
      removeBtn.onclick = () => span.remove();
      span.append(removeBtn);
      list.appendChild(span);
      input.value = '';
    }

    async function saveTagModal() {
      if (!tagModalFilename) return;
      // 读取选中的预设标签
      const presetBtns = document.querySelectorAll('#preset-tags-list button[data-active="1"]');
      const presetChecked = Array.from(presetBtns).map(b => b.dataset.tag);
      const customSpans = document.querySelectorAll('#custom-tags-list .tag');
      const customTags = Array.from(customSpans).map(s => s.textContent.replace('×', '').trim());
      const all = [...new Set([...presetChecked, ...customTags])];

      await fetch(tagApiUrl(tagModalFilename), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tags: all }),
      });

      closeTagModal();
      // 刷新
      if (currentFilename === tagModalFilename) {
        const resp = await fetch(reportApiUrl(tagModalFilename));
        const data = await resp.json();
        renderReportTags(data._tags || []);
      }
      loadHistory();
      init(); // 刷新标签列表
    }

    function closeTagModal() {
      document.getElementById('tag-modal').classList.add('hidden');
      tagModalFilename = null;
    }

    // ==================== 登录状态 ====================
    let sessionCache = { data: null, time: 0 };
    const SESSION_CACHE_TTL = 5 * 60 * 1000; // 5 分钟缓存

    async function showSessionStatus(forceRefresh = false) {
      document.getElementById('session-modal').classList.remove('hidden');

      const now = Date.now();
      const cached = sessionCache.data && (now - sessionCache.time < SESSION_CACHE_TTL);

      const list = document.getElementById('session-list');
      const platforms = { linkedin: 'LinkedIn', instagram: 'Instagram', facebook: 'Facebook', x: 'X' };

      let sessions;

      if (cached && !forceRefresh) {
        // 使用缓存
        sessions = sessionCache.data;
      } else {
        // 显示加载中
        list.innerHTML = `
          <div class="flex flex-col items-center justify-center py-8 text-gray-400">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mb-3"></div>
            <span class="text-sm">正在验证各平台登录状态...</span>
            <span class="text-xs mt-1">需要打开浏览器检测，约需 10-20 秒</span>
          </div>
        `;

        const resp = await fetch('/api/session/status');
        sessions = await resp.json();
        sessionCache = { data: sessions, time: now };
      }

      const cacheAge = Math.floor((now - sessionCache.time) / 1000);
      const cacheLabel = cacheAge < 60 ? `${cacheAge}秒前` : `${Math.floor(cacheAge / 60)}分钟前`;

      const cdp = sessions.cdp || { connected: false, endpoint: 'http://localhost:9222' };
      const platformSessions = Object.fromEntries(
        Object.entries(sessions).filter(([key]) => key !== 'cdp')
      );

      list.innerHTML = `
        <div class="session-toolbar">
          <span class="text-xs text-gray-400">上次检测: ${cacheLabel}</span>
          <button onclick="showSessionStatus(true)" class="session-action session-action-secondary">重新检测</button>
        </div>
        <div class="session-row">
          <div class="flex items-center gap-3 min-w-0">
            <div class="session-icon ${cdp.connected ? 'session-icon-ok' : 'session-icon-warn'}">C</div>
            <div class="min-w-0">
              <span class="font-medium text-gray-900">Chrome</span>
              <div class="text-xs text-gray-400 truncate">${cdp.endpoint || 'http://localhost:9222'}</div>
            </div>
          </div>
          <div class="session-actions">
            <span class="session-status ${cdp.connected ? 'session-status-ok' : 'session-status-warn'}">
              ${cdp.connected ? '已连接' : '未连接'}
            </span>
            <button onclick="${cdp.connected ? 'showSessionStatus(true)' : 'startChrome()'}" id="chrome-start-btn"
              class="session-action ${cdp.connected ? 'session-action-secondary' : 'session-action-primary'}">
              ${cdp.connected ? '重新连接' : '连接'}
            </button>
          </div>
        </div>
      ` + Object.entries(platformSessions).map(([key, info]) => {
        const name = platforms[key] || key;
        const icon = name === 'LinkedIn' ? 'in' : name[0];

        if (info.exists && info.valid) {
          const date = new Date(info.modifiedAt).toLocaleDateString('zh-CN');
          return `<div class="session-row">
            <div class="flex items-center gap-3 min-w-0">
              <div class="session-icon session-icon-ok">${icon}</div>
              <div class="min-w-0">
                <span class="font-medium text-gray-900">${name}</span>
                <div class="text-xs text-gray-400">上次登录: ${date}</div>
              </div>
            </div>
            <div class="session-actions">
              <span class="session-status session-status-ok">已登录</span>
              <button onclick="startLogin('${key}')"
                class="session-action session-action-secondary">
                重新登录
              </button>
            </div>
          </div>`;
        } else if (info.exists && !info.valid) {
          const date = new Date(info.modifiedAt).toLocaleDateString('zh-CN');
          return `<div class="session-row">
            <div class="flex items-center gap-3 min-w-0">
              <div class="session-icon session-icon-warn">${icon}</div>
              <div class="min-w-0">
                <span class="font-medium text-gray-900">${name}</span>
                <div class="text-xs text-amber-500">Session 已过期 (${date} 登录)</div>
              </div>
            </div>
            <div class="session-actions">
              <span class="session-status session-status-warn">已过期</span>
              <button onclick="startLogin('${key}')" id="login-btn-${key}"
                class="session-action session-action-primary">
                重新登录
              </button>
            </div>
          </div>`;
        } else {
          return `<div class="session-row">
            <div class="flex items-center gap-3 min-w-0">
              <div class="session-icon">${icon}</div>
              <div class="min-w-0">
                <span class="font-medium text-gray-900">${name}</span>
                <div class="text-xs text-gray-400">未登录</div>
              </div>
            </div>
            <div class="session-actions">
              <span class="session-status session-status-idle">未登录</span>
              <button onclick="startLogin('${key}')" id="login-btn-${key}"
                class="session-action session-action-primary">
                登录
              </button>
            </div>
          </div>`;
        }
      }).join('');
    }

    function closeSessionModal() {
      document.getElementById('session-modal').classList.add('hidden');
    }

    // 点击背景关闭登录弹窗
    document.getElementById('session-modal').addEventListener('click', function(e) {
      if (e.target === this) closeSessionModal();
    });

    // ==================== 平台登录 ====================
    const loginLoggers = {};

    async function startChrome() {
      const btn = document.getElementById('chrome-start-btn');
      if (btn) {
        btn.disabled = true;
        btn.textContent = '启动中...';
        btn.classList.add('opacity-60', 'cursor-not-allowed');
      }

      try {
        const resp = await fetch('/api/session/chrome/start', { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || '启动失败');

        sessionCache = { data: null, time: 0 };
        setTimeout(() => showSessionStatus(true), 1500);
      } catch (err) {
        alert(err.message);
        if (btn) {
          btn.disabled = false;
          btn.textContent = '连接';
          btn.classList.remove('opacity-60', 'cursor-not-allowed');
        }
      }
    }
    window.startChrome = startChrome;

    async function startLogin(platform) {
      const btn = document.getElementById(`login-btn-${platform}`);
      if (btn) {
        btn.disabled = true;
        btn.textContent = '登录中...';
        btn.classList.add('opacity-60', 'cursor-not-allowed');
      }

      // 添加日志区域
      const logId = `login-log-${platform}`;
      let logEl = document.getElementById(logId);
      if (!logEl) {
        logEl = document.createElement('div');
        logEl.id = logId;
        logEl.className = 'mt-2 p-3 bg-gray-900 text-gray-300 rounded-lg font-mono text-xs max-h-32 overflow-y-auto';
        const btnParent = btn?.parentElement;
        if (btnParent) btnParent.after(logEl);
      }
      logEl.innerHTML = '';
      logEl.classList.remove('hidden');

      function addLoginLog(msg) {
        const d = document.createElement('div');
        d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logEl.appendChild(d);
        logEl.scrollTop = logEl.scrollHeight;
      }

      addLoginLog(`正在打开 ${platform} 登录页面...`);

      try {
        const resp = await fetch(`/api/session/login/${platform}`, { method: 'POST' });
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          let eventType = null;
          for (const line of lines) {
            if (line.startsWith('event: ')) {
              eventType = line.slice(7);
            } else if (line.startsWith('data: ') && eventType) {
              const data = JSON.parse(line.slice(6));

              if (eventType === 'progress') {
                addLoginLog(data.message);
              } else if (eventType === 'success') {
                addLoginLog('✅ ' + data.message);
                // 清除缓存并刷新状态
                sessionCache = { data: null, time: 0 };
                setTimeout(() => showSessionStatus(), 1000);
              } else if (eventType === 'error') {
                addLoginLog('❌ ' + data.message);
                if (btn) {
                  btn.disabled = false;
                  btn.textContent = '重试';
                  btn.classList.remove('opacity-60', 'cursor-not-allowed');
                }
              }
              eventType = null;
            }
          }
        }
      } catch (err) {
        addLoginLog('❌ 连接错误: ' + err.message);
        if (btn) {
          btn.disabled = false;
          btn.textContent = '重试';
          btn.classList.remove('opacity-60', 'cursor-not-allowed');
        }
      }
    }

    // ==================== UI 工具 ====================
    function showSection(name) { document.getElementById(name + '-section')?.classList.remove('hidden'); }
    function hideSection(name) { document.getElementById(name + '-section')?.classList.add('hidden'); }
  </script>
